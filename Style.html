<style>
/* =========================================
   MASTER CSS VARIABLES & RESET
   ========================================= */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  /* Colors */
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-tertiary: #334155;
  
  --text-primary: #f8fafc;
  --text-secondary: #94a3b8;
  
  --accent-primary: #3b82f6;
  --accent-hover: #2563eb;
  
  --success: #10b981;
  --error: #ef4444;
  --warning: #f59e0b;

  --border-color: rgba(255, 255, 255, 0.1);

  /* Layout Constants */
  --sidebar-width: 260px;
  --header-height: 70px;
  
  /* Utilities */
  --transition: all 0.3s ease;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --shadow-glass: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* =========================================
   COMPONENTS - BUTTONS & ALERTS (COMMON)
   ========================================= */
.btn-primary {
  width: 100%;
  padding: 14px;
  background: var(--accent-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.btn-primary:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
}

.btn-primary.loading .spinner {
  display: block;
}
.btn-primary.loading .text {
  display: none;
}

.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  border-top-color: #fff;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  padding: 12px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  margin-bottom: 20px;
  display: none;
}
.alert.error {
  display: block;
  background: rgba(239, 68, 68, 0.1);
  color: #fca5a5;
  border: 1px solid rgba(239, 68, 68, 0.2);
}


/* =========================================
   PAGE SPECIFIC: INDEX / LOGIN
   ========================================= */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: radial-gradient(circle at top right, #1e293b, #0f172a);
  position: relative;
}
.login-container::before {
  content: ''; position: absolute; top: 10%; left: 20%; width: 300px; height: 300px; background: var(--accent-primary); border-radius: 50%; filter: blur(150px); opacity: 0.3; z-index: 0;
}
.login-container::after {
  content: ''; position: absolute; bottom: 10%; right: 20%; width: 400px; height: 400px; background: #6366f1; border-radius: 50%; filter: blur(150px); opacity: 0.2; z-index: 0;
}
.login-card {
  width: 100%;
  max-width: 420px;
  background: rgba(30, 41, 59, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border-color);
  border-radius: var(--radius-lg);
  padding: 40px;
  box-shadow: var(--shadow-glass);
  z-index: 1;
}
.login-header h1 {
  text-align: center; font-size: 1.8rem; margin-bottom: 8px; color: #fff;
}
.login-header p {
  text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 0.95rem;
}
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; }
.form-control { width: 100%; padding: 12px 16px; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-primary); font-size: 1rem; outline: none; }
.form-control:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }


/* =========================================
   PAGE SPECIFIC: DASHBOARD
   ========================================= */
.dashboard-container {
  display: flex;
  height: 100vh;
  overflow: hidden;
}
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
}
.sidebar-header { height: var(--header-height); display: flex; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border-color); }
.brand { font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #fff; }
.brand-icon { width: 32px; height: 32px; background: var(--accent-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
.nav-links { padding: 20px 12px; flex: 1; overflow-y: auto; list-style: none; }
.nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-secondary); text-decoration: none; font-weight: 500; transition: var(--transition); cursor: pointer; margin-bottom: 8px; }
.nav-link:hover, .nav-link.active { background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); }
.nav-link svg { width: 20px; height: 20px; }

.sidebar-footer { padding: 20px; border-top: 1px solid var(--border-color); }
.user-profile { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.avatar { width: 40px; height: 40px; background: var(--bg-tertiary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #fff; }
.user-info .name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
.user-info .role { font-size: 0.75rem; color: var(--text-secondary); }
.btn-logout { width: 100%; padding: 10px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-size: 0.85rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-logout:hover { background: rgba(239, 68, 68, 0.1); color: var(--error); border-color: rgba(239, 68, 68, 0.3); }

.main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
.top-header { height: var(--header-height); background: var(--bg-primary); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
.page-title { font-size: 1.25rem; font-weight: 600; }
.content-area { padding: 30px; flex: 1; overflow-y: auto; }
.tab-pane { display: none; }
.tab-pane.active { display: block; animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Empty States */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; min-height: 400px; background: var(--bg-secondary); border-radius: var(--radius-lg); border: 1px dashed var(--border-color); text-align: center; padding: 40px; }
.empty-state-icon { width: 64px; height: 64px; background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
.empty-state h3 { font-size: 1.25rem; margin-bottom: 10px; }
.empty-state p { color: var(--text-secondary); max-width: 400px; }
</style>
