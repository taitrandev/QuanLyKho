<script>
document.addEventListener('DOMContentLoaded', () => {
    loadAlerts();

    document.getElementById('btnSendAlert').addEventListener('click', function() {
        const btn = this;
        Swal.fire({
            title: 'Xác nhận',
            text: 'Hệ thống sẽ gửi email báo cáo tình trạng thiếu hàng đến Ban Giám Đốc và Bộ Phận Mua Hàng. Tiếp tục?',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Đồng ý',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                btn.classList.add('loading');
                const sessionStr = sessionStorage.getItem('warehouse_user');
                const email = sessionStr ? JSON.parse(sessionStr).email : '';
                
                google.script.run
                    .withSuccessHandler(function(res) {
                        btn.classList.remove('loading');
                        if(res.success) Toast.fire({ icon: 'success', title: res.message });
                        else Toast.fire({ icon: 'error', title: res.message });
                    })
                    .triggerAlertEmail(email);
            }
        });
    });
});

function loadAlerts() {
    google.script.run
        .withSuccessHandler(function(res) {
            if(res.success) {
                renderAlertsTable(res.data);
            } else {
                Toast.fire({ icon: 'error', title: "Lỗi tải cảnh báo: " + res.message });
            }
        })
        .getLowStockProducts();
}

function renderAlertsTable(data) {
    const tbody = document.getElementById('alertsBody');
    if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color: var(--success-color);"><i data-feather="check-circle" style="display: block; margin: 0 auto 10px;"></i> Tất cả hàng hoá đều ở mức an toàn định mức!</td></tr>`;
        feather.replace();
        // Ẩn nút gửi mail nếu không có gì để cảnh báo
        document.getElementById('btnSendAlert').style.display = 'none';
        return;
    }

    let html = '';
    data.forEach(item => {
        html += `
        <tr class="data-row" style="background: rgba(239, 68, 68, 0.05);">
            <td class="fw-bold">${item.Product_ID}</td>
            <td>${item.Product_Name}</td>
            <td style="color: var(--danger-color); font-weight: bold;">${item.Current_Stock}</td>
            <td>${item.Min_Stock}</td>
            <td>${item.Supplier_Name}</td>
            <td><code style="font-size: 11px;">${item.Supplier_Phone}</code></td>
        </tr>`;
    });
    
    tbody.innerHTML = html;
    
    const sessionStr = sessionStorage.getItem('warehouse_user');
    const userRole = sessionStr ? JSON.parse(sessionStr).role : 'viewer';
    if (userRole === 'admin') {
        document.getElementById('btnSendAlert').style.display = 'flex';
    } else {
        document.getElementById('btnSendAlert').style.display = 'none';
    }
    
    feather.replace();
}
</script>
